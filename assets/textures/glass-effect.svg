<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02" />
    </linearGradient>
    <filter id="glassBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feSpecularLighting result="specOut" in="blur" specularConstant="1.5" specularExponent="20" lighting-color="white">
        <fePointLight x="-50" y="30" z="200"/>
      </feSpecularLighting>
      <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut2"/>
      <feComposite in="SourceGraphic" in2="specOut2" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>
  </defs>
  
  <!-- Glass Panel Background -->
  <rect width="800" height="600" rx="16" fill="url(#glassGradient)" filter="url(#glassBlur)"/>
  
  <!-- Glass Border -->
  <rect x="2" y="2" width="796" height="596" rx="14" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  
  <!-- Glass Reflection -->
  <ellipse cx="400" cy="100" rx="300" ry="80" fill="#ffffff" opacity="0.05">
    <animate attributeName="opacity" values="0.05;0.1;0.05" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Glass Highlights -->
  <g stroke="#ffffff" stroke-width="1" fill="none" opacity="0.3">
    <path d="M 50 50 Q 400 30 750 50"/>
    <path d="M 50 550 Q 400 570 750 550"/>
  </g>
  
  <!-- Glass Frosted Effect -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="50" fill="#ffffff" opacity="0.3"/>
    <circle cx="700" cy="500" r="80" fill="#ffffff" opacity="0.2"/>
    <circle cx="600" cy="150" r="40" fill="#ffffff" opacity="0.25"/>
    <circle cx="200" cy="450" r="60" fill="#ffffff" opacity="0.2"/>
  </g>
</svg>
