<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textureGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:0.1" />
    </linearGradient>
    <pattern id="noisePattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#textureGradient)"/>
      <!-- Random noise dots -->
      <circle cx="10" cy="15" r="0.5" fill="#374151" opacity="0.3"/>
      <circle cx="25" cy="8" r="0.8" fill="#4b5563" opacity="0.2"/>
      <circle cx="45" cy="25" r="0.6" fill="#374151" opacity="0.4"/>
      <circle cx="68" cy="12" r="0.4" fill="#6b7280" opacity="0.3"/>
      <circle cx="82" cy="30" r="0.7" fill="#374151" opacity="0.2"/>
      <circle cx="15" cy="55" r="0.5" fill="#4b5563" opacity="0.3"/>
      <circle cx="35" cy="48" r="0.9" fill="#374151" opacity="0.2"/>
      <circle cx="58" cy="62" r="0.6" fill="#6b7280" opacity="0.4"/>
      <circle cx="78" cy="70" r="0.4" fill="#374151" opacity="0.3"/>
      <circle cx="92" cy="58" r="0.8" fill="#4b5563" opacity="0.2"/>
      <circle cx="8" cy="85" r="0.5" fill="#374151" opacity="0.3"/>
      <circle cx="28" cy="92" r="0.7" fill="#6b7280" opacity="0.2"/>
      <circle cx="52" cy="88" r="0.6" fill="#374151" opacity="0.4"/>
      <circle cx="72" cy="95" r="0.4" fill="#4b5563" opacity="0.3"/>
      <circle cx="88" cy="82" r="0.9" fill="#374151" opacity="0.2"/>
    </pattern>
    <filter id="roughPaper">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise" seed="1"/>
      <feDiffuseLighting in="noise" lighting-color="white" surfaceScale="1">
        <feDistantLight azimuth="45" elevation="60"/>
      </feDiffuseLighting>
    </filter>
  </defs>
  
  <!-- Base -->
  <rect width="400" height="400" fill="#0f172a"/>
  
  <!-- Noise Pattern Overlay -->
  <rect width="400" height="400" fill="url(#noisePattern)"/>
  
  <!-- Paper Texture Effect -->
  <rect width="400" height="400" fill="#ffffff" opacity="0.02" filter="url(#roughPaper)"/>
  
  <!-- Subtle Grid -->
  <g stroke="#374151" stroke-width="0.3" opacity="0.1">
    <line x1="0" y1="50" x2="400" y2="50"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="250" x2="400" y2="250"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="0" y1="350" x2="400" y2="350"/>
    
    <line x1="50" y1="0" x2="50" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="250" y1="0" x2="250" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="350" y1="0" x2="350" y2="400"/>
  </g>
</svg>
