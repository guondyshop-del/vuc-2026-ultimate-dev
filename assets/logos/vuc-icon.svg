<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vucIconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="120" height="120" rx="20" fill="url(#vucIconGradient)" opacity="0.1"/>
  
  <!-- Main Brain Icon Simplified -->
  <g transform="translate(60, 60)">
    <!-- Brain Shape -->
    <path d="M -20 -8 C -25 -12, -25 -18, -18 -22 C -14 -26, -7 -26, -3 -22 C 0 -26, 7 -26, 11 -22 C 14 -26, 21 -26, 25 -22 C 28 -18, 28 -12, 25 -8 C 28 -4, 28 4, 25 8 C 28 12, 28 18, 25 22 C 21 26, 14 26, 11 22 C 7 26, 0 26, -3 22 C -7 26, -14 26, -18 22 C -21 26, -25 18, -25 14 C -28 10, -28 4, -25 0 C -28 -4, -28 -10, -25 -14 C -25 -18, -20 -18, -20 -8 Z" 
          fill="url(#vucIconGradient)" 
          filter="url(#iconGlow)"/>
    
    <!-- Neural Nodes -->
    <g fill="#ffffff" opacity="0.9">
      <circle cx="-12" cy="-10" r="2"/>
      <circle cx="12" cy="10" r="2"/>
      <circle cx="-12" cy="0" r="2"/>
      <circle cx="12" cy="0" r="2"/>
      <circle cx="-12" cy="10" r="2"/>
      <circle cx="12" cy="-10" r="2"/>
      <circle cx="0" cy="-12" r="2"/>
      <circle cx="0" cy="12" r="2"/>
    </g>
    
    <!-- Connecting Lines -->
    <g stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.6">
      <line x1="-12" y1="-10" x2="12" y2="10"/>
      <line x1="-12" y1="0" x2="12" y2="0"/>
      <line x1="-12" y1="10" x2="12" y2="-10"/>
      <line x1="0" y1="-12" x2="0" y2="12"/>
    </g>
  </g>
</svg>
