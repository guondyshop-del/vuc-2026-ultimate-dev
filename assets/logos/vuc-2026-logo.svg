<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vucGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="vucGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#A78BFA;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#F472B6;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#vucGradient)" opacity="0.1"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#vucGradient)" stroke-width="2" opacity="0.3"/>
  
  <!-- Main Brain Icon -->
  <g transform="translate(100, 100)">
    <!-- Brain Outline -->
    <path d="M -30 -10 C -35 -15, -35 -25, -25 -30 C -20 -35, -10 -35, -5 -30 C 0 -35, 10 -35, 15 -30 C 20 -35, 30 -35, 35 -30 C 40 -25, 40 -15, 35 -10 C 40 -5, 40 5, 35 10 C 40 15, 40 25, 35 30 C 30 35, 20 35, 15 30 C 10 35, 0 35, -5 30 C -10 35, -20 35, -25 30 C -30 35, -35 25, -35 20 C -40 15, -40 5, -35 0 C -40 -5, -40 -15, -35 -20 C -35 -25, -30 -25, -30 -10 Z" 
          fill="url(#vucGradient)" 
          filter="url(#glow)"
          opacity="0.9"/>
    
    <!-- Neural Network Lines -->
    <g stroke="url(#vucGlow)" stroke-width="2" fill="none" opacity="0.8">
      <line x1="-20" y1="-15" x2="20" y2="15"/>
      <line x1="-20" y1="0" x2="20" y2="0"/>
      <line x1="-20" y1="15" x2="20" y2="-15"/>
      <line x1="0" y1="-20" x2="0" y2="20"/>
      <circle cx="-20" cy="-15" r="3" fill="url(#vucGlow)"/>
      <circle cx="20" cy="15" r="3" fill="url(#vucGlow)"/>
      <circle cx="-20" cy="0" r="3" fill="url(#vucGlow)"/>
      <circle cx="20" cy="0" r="3" fill="url(#vucGlow)"/>
      <circle cx="-20" cy="15" r="3" fill="url(#vucGlow)"/>
      <circle cx="20" cy="-15" r="3" fill="url(#vucGlow)"/>
      <circle cx="0" cy="-20" r="3" fill="url(#vucGlow)"/>
      <circle cx="0" cy="20" r="3" fill="url(#vucGlow)"/>
    </g>
    
    <!-- VUC Text -->
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="url(#vucGradient)">VUC</text>
    <text x="0" y="65" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="url(#vucGradient)" opacity="0.8">2026</text>
  </g>
  
  <!-- Orbiting Elements -->
  <g opacity="0.6">
    <circle cx="100" cy="30" r="4" fill="url(#vucGlow)">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="170" cy="100" r="3" fill="url(#vucGlow)">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="170" r="4" fill="url(#vucGlow)">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="25s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="100" r="3" fill="url(#vucGlow)">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="18s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
