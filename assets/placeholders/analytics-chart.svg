<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chartGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartBgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="120" height="120" rx="8" fill="url(#chartBgGradient)"/>
  
  <!-- Chart Bars -->
  <g>
    <!-- Bar 1 -->
    <rect x="15" y="80" width="15" height="30" rx="2" fill="url(#chartGradient)" opacity="0.8"/>
    <!-- Bar 2 -->
    <rect x="35" y="60" width="15" height="50" rx="2" fill="url(#chartGradient)" opacity="0.8"/>
    <!-- Bar 3 -->
    <rect x="55" y="40" width="15" height="70" rx="2" fill="url(#chartGradient)" opacity="0.8"/>
    <!-- Bar 4 -->
    <rect x="75" y="50" width="15" height="60" rx="2" fill="url(#chartGradient)" opacity="0.8"/>
    <!-- Bar 5 -->
    <rect x="95" y="70" width="15" height="40" rx="2" fill="url(#chartGradient)" opacity="0.8"/>
  </g>
  
  <!-- Trend Line -->
  <polyline points="22,85 45,65 67,45 87,55 107,75" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.8"/>
  
  <!-- Data Points -->
  <g fill="#fbbf24" opacity="0.9">
    <circle cx="22" cy="85" r="3"/>
    <circle cx="45" cy="65" r="3"/>
    <circle cx="67" cy="45" r="3"/>
    <circle cx="87" cy="55" r="3"/>
    <circle cx="107" cy="75" r="3"/>
  </g>
  
  <!-- Grid Lines -->
  <g stroke="#374151" stroke-width="0.5" opacity="0.3">
    <line x1="10" y1="30" x2="110" y2="30"/>
    <line x1="10" y1="50" x2="110" y2="50"/>
    <line x1="10" y1="70" x2="110" y2="70"/>
    <line x1="10" y1="90" x2="110" y2="90"/>
  </g>
  
  <!-- Axis -->
  <g stroke="#6b7280" stroke-width="1" opacity="0.5">
    <line x1="10" y1="110" x2="110" y2="110"/>
    <line x1="10" y1="20" x2="10" y2="110"/>
  </g>
</svg>
