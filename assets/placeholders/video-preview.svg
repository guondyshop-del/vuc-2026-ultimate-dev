<svg width="400" height="225" viewBox="0 0 400 225" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="previewGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <pattern id="previewGrid" width="25" height="25" patternUnits="userSpaceOnUse">
      <rect width="25" height="25" fill="none" stroke="#374151" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="225" fill="url(#previewGradient)"/>
  <rect width="400" height="225" fill="url(#previewGrid)"/>
  
  <!-- Video Content Area -->
  <rect x="50" y="30" width="300" height="140" rx="8" fill="#000000" opacity="0.3"/>
  
  <!-- Play Button Center -->
  <g transform="translate(200, 100)">
    <circle cx="0" cy="0" r="25" fill="#000000" opacity="0.7"/>
    <path d="M -8 -12 L -8 12 L 12 0 Z" fill="#ffffff" opacity="0.9"/>
  </g>
  
  <!-- Progress Bar -->
  <rect x="50" y="180" width="300" height="6" rx="3" fill="#374151" opacity="0.5"/>
  <rect x="50" y="180" width="120" height="6" rx="3" fill="#3B82F6"/>
  
  <!-- Controls -->
  <g fill="#ffffff" opacity="0.7">
    <!-- Play/Pause -->
    <rect x="50" y="195" width="8" height="8" rx="1"/>
    <!-- Skip Back -->
    <path d="M 80 195 L 80 203 L 75 199 Z M 85 195 L 85 203 L 80 199 Z"/>
    <!-- Skip Forward -->
    <path d="M 310 195 L 310 203 L 315 199 Z M 315 195 L 315 203 L 320 199 Z"/>
    <!-- Volume -->
    <rect x="90" y="197" width="20" height="4" rx="2"/>
    <rect x="90" y="195" width="4" height="8" rx="1"/>
    <!-- Fullscreen -->
    <rect x="360" y="195" width="8" height="8" rx="1" fill="none" stroke="#ffffff" stroke-width="1"/>
  </g>
  
  <!-- Time Display -->
  <text x="200" y="203" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ffffff" opacity="0.8">3:24 / 10:24</text>
  
  <!-- Title Overlay -->
  <rect x="50" y="15" width="300" height="12" rx="3" fill="#000000" opacity="0.6"/>
  <text x="200" y="24" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ffffff" opacity="0.9">Video Title Placeholder</text>
</svg>
