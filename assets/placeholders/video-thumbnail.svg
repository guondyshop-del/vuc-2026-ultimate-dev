<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="videoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <pattern id="gridPattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none" stroke="#374151" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="320" height="180" fill="url(#videoGradient)"/>
  <rect width="320" height="180" fill="url(#gridPattern)"/>
  
  <!-- Play Button Overlay -->
  <g transform="translate(160, 90)">
    <circle cx="0" cy="0" r="30" fill="#000000" opacity="0.7"/>
    <path d="M -10 -15 L -10 15 L 15 0 Z" fill="#ffffff" opacity="0.9"/>
  </g>
  
  <!-- Duration Badge -->
  <rect x="260" y="150" width="50" height="20" rx="3" fill="#000000" opacity="0.8"/>
  <text x="285" y="163" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ffffff">10:24</text>
  
  <!-- Title Placeholder -->
  <rect x="10" y="10" width="200" height="15" rx="3" fill="#374151" opacity="0.6"/>
  <rect x="10" y="30" width="150" height="10" rx="3" fill="#374151" opacity="0.4"/>
  
  <!-- Views Badge -->
  <rect x="10" y="150" width="80" height="20" rx="3" fill="#000000" opacity="0.6"/>
  <text x="50" y="163" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#ffffff">1.2M views</text>
</svg>
